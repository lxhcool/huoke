version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: huoke-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: huoke
      POSTGRES_USER: huoke
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huoke123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: huoke-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: huoke-api
    restart: unless-stopped
    shm_size: "2gb"
    env_file:
      - ./apps/api/.env.production
    environment:
      DATABASE_URL: postgresql+psycopg://huoke:${POSTGRES_PASSWORD:-huoke123}@postgres:5432/huoke
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      ALLOWED_ORIGINS: '["https://huoke.lxhcoool.cn","http://huoke.lxhcoool.cn"]'
    ports:
      - "8000:8000"
      - "6080:6080"
    volumes:
      - api_data:/app/data
      - api_auth_cache:/app/.auth-cache
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: huoke-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "4000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: huoke-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 如果需要 nginx 处理 SSL，取消注释：
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  api_data:
  api_auth_cache:
